<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Embed Checkout Form</title><link rel="stylesheet" href="../assets/css/styles.css"><script type="module" src="../assets/js/forms.js"></script></head><body class="embed-page"><main class="embed-shell"><article class="card"><div class="card-body"><form class="form" data-public-form="checkout"><div class="form-row"><label>Nama</label><input name="name" required></div><div class="form-row"><label>Email</label><input type="email" name="email" required></div><div class="form-row"><label>Plan</label><select name="plan"><option value="starter">Starter</option><option value="premium">Premium</option><option value="enterprise">Enterprise</option></select></div><div class="form-row"><label>Nominal</label><input type="number" name="amount" value="199000" required></div><div class="form-row"><label>Payment</label><select name="gateway"><option value="manual">Manual Transfer</option><option value="midtrans">Midtrans</option><option value="tripay">Tripay</option><option value="xendit">Xendit</option></select></div><button class="btn primary" type="submit">Buat Order</button><div data-form-status></div></form></div></article></main></body></html>
