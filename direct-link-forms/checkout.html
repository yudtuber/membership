<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Checkout - MembershipPro</title><link rel="stylesheet" href="../assets/css/styles.css"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script><script type="module" src="../assets/js/app.js"></script><script type="module" src="../assets/js/forms.js"></script></head><body data-base="../"><header class="topbar" data-topbar></header><main class="form-wrap"><article class="card"><div class="card-body"><h1>Checkout</h1><p>Buat order dan lanjutkan pembayaran.</p><form class="form" data-public-form="checkout"><div class="form-row"><label>Nama</label><input name="name" required></div><div class="form-row"><label>Email</label><input type="email" name="email" required></div><div class="form-row"><label>Plan</label><input name="plan" value="starter"></div><div class="form-row"><label>Nominal</label><input type="number" name="amount" value="199000" required></div><div class="form-row"><label>Payment</label><select name="gateway"><option value="manual">Manual Transfer</option><option value="midtrans">Midtrans</option><option value="tripay">Tripay</option><option value="xendit">Xendit</option></select></div><button class="btn primary" type="submit">Buat Order</button><div data-form-status></div></form></div></article></main><script>const q=new URLSearchParams(location.search);for(const k of ["plan","amount"]){const el=document.querySelector(`[name="${k}"]`);if(el&&q.get(k))el.value=q.get(k);}</script></body></html>
