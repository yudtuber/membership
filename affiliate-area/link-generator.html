<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link Generator - MembershipPro</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <script type="module" src="../assets/js/app.js"></script>
</head>
<body data-base="../" data-area="affiliate" data-protected="true">
  <div class="layout">
    <aside class="sidebar" data-sidebar></aside>
    <main class="content">
      <div class="page-head">
        <div>
          <p class="eyebrow">Affiliate area</p>
          <h1>Link Generator</h1>
          <p>Buat link campaign, simpan kode unik, dan lengkapi rekening payout.</p>
        </div>
      </div>
      <article class="card">
        <div class="card-body">
          <form class="form" data-link-generator>
            <div class="form-row">
              <label>Target URL</label>
              <input name="target" value="../salespage.html">
            </div>
            <div class="form-row">
              <label>Kode Affiliate Unik</label>
              <input name="code" placeholder="phitoe" required>
            </div>
            <div class="form-row">
              <label>Campaign</label>
              <input name="campaign" placeholder="launch-juli">
            </div>
            <div class="grid three">
              <div class="form-row">
                <label>Bank</label>
                <input name="bankName" placeholder="BCA">
              </div>
              <div class="form-row">
                <label>Nomor Rekening</label>
                <input name="bankAccountNumber" placeholder="1234567890">
              </div>
              <div class="form-row">
                <label>Nama Pemilik</label>
                <input name="bankAccountName" placeholder="Nama sesuai rekening">
              </div>
            </div>
            <label><input type="checkbox" name="saveCode" value="yes"> Simpan kode dan rekening ke profil affiliate</label>
            <button class="btn primary" type="submit"><i data-lucide="link"></i>Generate</button>
            <div class="form-row">
              <label>Hasil Link</label>
              <input data-generated-link readonly>
            </div>
          </form>
        </div>
      </article>
    </main>
  </div>
</body>
</html>
